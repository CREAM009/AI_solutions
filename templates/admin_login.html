<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | AI-Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
      body {
        background: linear-gradient(135deg, #f8fafc 0%, #eef4ff 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .admin-login-card {
        width: min(100%, 460px);
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(37, 99, 235, 0.12);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        overflow: hidden;
      }

      .admin-login-header {
        padding: 2rem 2rem 1rem;
        text-align: center;
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.06), rgba(96, 165, 250, 0.1));
      }

      .admin-login-header .brand-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 1rem;
        font-size: 1.4rem;
      }

      .admin-login-body {
        padding: 1.5rem 2rem 2rem;
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
      }

      .password-input-wrap {
        position: relative;
      }

      .login-btn {
        width: 100%;
        margin-top: 0.6rem;
      }

      .login-error {
        color: #dc2626;
        font-size: 0.95rem;
        margin-top: 0.8rem;
        min-height: 1.2rem;
      }

      @media (max-width: 576px) {
        .admin-login-body {
          padding: 1.2rem 1.2rem 1.5rem;
        }

        .admin-login-header {
          padding: 1.5rem 1.2rem 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-login-card">
      <div class="admin-login-header">
        <div class="brand-icon"><i class="bi bi-cpu"></i></div>
        <h3 class="mb-1">AI-Solutions</h3>
        <p class="text-muted mb-0">Secure Admin Access</p>
      </div>
      <div class="admin-login-body">
        <form method="post" action="{{ url_for('admin_login') }}">
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" id="username" name="username" type="text" placeholder="Enter username" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <div class="password-input-wrap">
              <input class="form-control" id="password" name="password" type="password" placeholder="Enter password" required />
              <button class="password-toggle" type="button" id="togglePassword" aria-label="Show password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <button class="btn btn-primary login-btn" type="submit">Login</button>
          {% if error %}
          <div class="login-error">{{ error }}</div>
          {% endif %}
        </form>
      </div>
    </div>

    <script>
      const togglePassword = document.getElementById('togglePassword');
      const passwordField = document.getElementById('password');

      togglePassword?.addEventListener('click', () => {
        const isHidden = passwordField.type === 'password';
        passwordField.type = isHidden ? 'text' : 'password';
        togglePassword.innerHTML = isHidden ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
        togglePassword.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      });
    </script>
  </body>
</html>
